<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>РЭМБО — Шутер</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a1a0a; overflow: hidden; font-family: 'Courier New', monospace; }
#gameCanvas { display: block; cursor: crosshair; }
#ui { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; }
#hud { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 16px; }
.hud-left, .hud-right { display: flex; flex-direction: column; gap: 4px; }
.hud-label { font-size: 11px; color: #4a8a4a; letter-spacing: 2px; text-transform: uppercase; }
.hud-value { font-size: 22px; font-weight: 900; color: #7fff00; text-shadow: 0 0 10px #7fff0055; letter-spacing: 1px; }
#healthBar { width: 180px; height: 8px; background: #1a2a1a; border: 1px solid #4a8a4a; border-radius: 4px; overflow: hidden; margin-top: 4px; }
#healthFill { height: 100%; width: 100%; background: linear-gradient(90deg, #ff2222, #ffaa00, #7fff00); transition: width 0.2s; border-radius: 4px; }
#ammoBar { display: flex; gap: 3px; flex-wrap: wrap; max-width: 200px; margin-top: 4px; }
.bullet-pip { width: 6px; height: 14px; background: #ffd700; border-radius: 2px; transition: opacity 0.1s; }
.bullet-pip.empty { background: #333; }
#centerMsg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
#waveAnnounce { font-size: 28px; font-weight: 900; color: #ff4444; text-shadow: 0 0 20px #ff444488; letter-spacing: 4px; opacity: 0; transition: opacity 0.5s; text-transform: uppercase; }
#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
#overlay h1 { font-size: 48px; font-weight: 900; color: #7fff00; text-shadow: 0 0 30px #7fff0066; letter-spacing: 6px; }
#overlay p { color: #4a8a4a; font-size: 14px; letter-spacing: 2px; text-align: center; max-width: 400px; line-height: 1.8; }
#startBtn { background: #7fff00; color: #0a1a0a; border: none; padding: 14px 40px; font-size: 16px; font-weight: 900; letter-spacing: 3px; cursor: pointer; border-radius: 4px; font-family: 'Courier New', monospace; text-transform: uppercase; transition: all 0.2s; }
#startBtn:hover { background: #ff4444; color: #fff; transform: scale(1.05); }
#killFeed { position: absolute; bottom: 60px; left: 16px; display: flex; flex-direction: column; gap: 4px; pointer-events: none; }
.kill-msg { font-size: 12px; color: #ff4444; letter-spacing: 1px; opacity: 1; transition: opacity 1s; background: rgba(0,0,0,0.5); padding: 2px 8px; border-left: 2px solid #ff4444; }
#comboDisplay { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); font-size: 18px; font-weight: 900; color: #ffd700; text-shadow: 0 0 10px #ffd70055; letter-spacing: 2px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
#crosshairInfo { position: absolute; bottom: 16px; right: 16px; font-size: 11px; color: #2a5a2a; letter-spacing: 1px; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="hud">
    <div class="hud-left">
      <div class="hud-label">Здоровье</div>
      <div id="healthBar"><div id="healthFill"></div></div>
      <div class="hud-label" style="margin-top:8px">Патроны</div>
      <div id="ammoBar"></div>
    </div>
    <div class="hud-right" style="text-align:right; align-items:flex-end">
      <div class="hud-label">Счёт</div>
      <div class="hud-value" id="scoreVal">0</div>
      <div class="hud-label" style="margin-top:8px">Волна</div>
      <div class="hud-value" id="waveVal">1</div>
      <div class="hud-label" style="margin-top:8px">Убито</div>
      <div class="hud-value" id="killVal">0</div>
    </div>
  </div>
  <div id="centerMsg"><div id="waveAnnounce">ВОЛНА 1</div></div>
  <div id="killFeed"></div>
  <div id="comboDisplay">КОМБО x0</div>
  <div id="crosshairInfo">НАЖМИ R — ПЕРЕЗАРЯДКА</div>
</div>
<div id="overlay">
  <h1>⚔ РЭМБО ⚔</h1>
  <p>УПРАВЛЕНИЕ<br>МЫШЬ — прицел и стрельба<br>WASD / СТРЕЛКИ — движение<br>R — перезарядка<br>SHIFT — бег</p>
  <button id="startBtn" onclick="startGame()">▶ НАЧАТЬ БОЙ</button>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const keys = {};
let mouse = { x: W/2, y: H/2 };
let gameRunning = false;
let gameOver = false;

const player = {
  x: 400, y: 300, w: 28, h: 36,
  hp: 100, maxHp: 100,
  speed: 3.5, runSpeed: 6,
  ammo: 30, maxAmmo: 30,
  reloading: false, reloadTime: 0,
  score: 0, kills: 0, wave: 1,
  combo: 0, comboTimer: 0,
  facing: 0, moving: false,
  invincible: 0, walkFrame: 0, walkTimer: 0,
  shootCooldown: 0
};

let bullets = [], enemies = [], particles = [], bloodPools = [], trees = [], bushes = [];
let waveTimer = 0, waveActive = false, enemiesLeft = 0;
let killMsgs = [];
let comboVisible = 0;

function genLevel() {
  trees = []; bushes = [];
  for (let i=0; i<40; i++) {
    trees.push({ x: Math.random()*W, y: Math.random()*H,
      r: 14+Math.random()*18, r2: 8+Math.random()*10,
      c: `hsl(${100+Math.random()*40},${40+Math.random()*30}%,${15+Math.random()*20}%)`,
      c2: `hsl(${80+Math.random()*50},${50+Math.random()*30}%,${25+Math.random()*20}%)`
    });
  }
  for (let i=0; i<60; i++) {
    bushes.push({ x: Math.random()*W, y: Math.random()*H,
      r: 8+Math.random()*12,
      c: `hsl(${110+Math.random()*30},${35+Math.random()*25}%,${20+Math.random()*15}%)`
    });
  }
}

function spawnWave(n) {
  const count = 5 + n*3;
  enemiesLeft = count;
  waveActive = true;
  const msgs = ['ВОЛНА '+n,'ДЕРЖИСЬ!','ОНИ ИДУТ!','ОГОНЬ!'];
  showWaveMsg(msgs[Math.min(n-1,msgs.length-1)] || 'ВОЛНА '+n);
  for (let i=0; i<count; i++) {
    setTimeout(() => spawnEnemy(n), i * 400 + 500);
  }
}

function spawnEnemy(wave) {
  const side = Math.floor(Math.random()*4);
  let ex = Math.random()*W, ey = Math.random()*H;
  if (side===0) ey = -40;
  else if (side===1) ey = H+40;
  else if (side===2) ex = -40;
  else ex = W+40;
  const types = ['soldier','heavy','sniper'];
  const type = wave<3 ? 'soldier' : types[Math.floor(Math.random()*(Math.min(wave,3)))];
  const configs = {
    soldier: { hp:40+wave*5, speed:1.2+wave*0.1, color:'#8B0000', size:24, fireRate:90, dmg:8, score:100 },
    heavy:   { hp:120+wave*15, speed:0.7, color:'#4B0082', size:32, fireRate:60, dmg:15, score:250 },
    sniper:  { hp:30+wave*5, speed:1.8, color:'#006400', size:20, fireRate:150, dmg:25, score:200 }
  };
  const cfg = configs[type];
  enemies.push({ x:ex, y:ey, hp:cfg.hp, maxHp:cfg.hp, speed:cfg.speed, color:cfg.color,
    size:cfg.size, fireRate:cfg.fireRate, fireCd:Math.floor(Math.random()*cfg.fireRate),
    dmg:cfg.dmg, score:cfg.score, type, facing:0, walkFrame:0, walkTimer:0,
    alertTimer:0, dead:false, deathTimer:0 });
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  Object.assign(player, { x:W/2, y:H/2, hp:100, ammo:30, reloading:false,
    score:0, kills:0, wave:1, combo:0, invincible:0, shootCooldown:0 });
  bullets=[]; enemies=[]; particles=[]; bloodPools=[];
  gameRunning=true; gameOver=false;
  genLevel();
  spawnWave(1);
  requestAnimationFrame(loop);
}

function showWaveMsg(txt) {
  const el = document.getElementById('waveAnnounce');
  el.textContent = txt;
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 2000);
}

function addKillMsg(txt) {
  killMsgs.push({ txt, t: 180 });
  if (killMsgs.length > 5) killMsgs.shift();
}

canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mousedown', e => { if (e.button===0) shoot(); });
canvas.addEventListener('click', e => shoot());
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key.toLowerCase()==='r') reload();
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

function shoot() {
  if (!gameRunning || gameOver) return;
  if (player.ammo <= 0 || player.reloading || player.shootCooldown > 0) {
    if (player.ammo <= 0 && !player.reloading) { reload(); }
    return;
  }
  player.ammo--;
  player.shootCooldown = 8;
  const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  const spread = 0.05;
  const a = angle + (Math.random()-0.5)*spread;
  bullets.push({ x:player.x, y:player.y, vx:Math.cos(a)*14, vy:Math.sin(a)*14,
    life:60, owner:'player', dmg:20+Math.floor(Math.random()*10) });
  for (let i=0; i<4; i++) {
    particles.push({ x:player.x, y:player.y,
      vx:Math.cos(a+Math.PI+(Math.random()-0.5)*1)*2,
      vy:Math.sin(a+Math.PI+(Math.random()-0.5)*1)*2,
      life:12, color:'#ffaa22', r:2 });
  }
  updateAmmoUI();
}

function reload() {
  if (player.reloading || player.ammo === player.maxAmmo) return;
  player.reloading = true;
  player.reloadTime = 120;
  showWaveMsg('ПЕРЕЗАРЯДКА...');
}

function updateAmmoUI() {
  const bar = document.getElementById('ammoBar');
  bar.innerHTML = '';
  for (let i=0; i<player.maxAmmo; i++) {
    const pip = document.createElement('div');
    pip.className = 'bullet-pip' + (i >= player.ammo ? ' empty' : '');
    bar.appendChild(pip);
  }
}

function update() {
  const run = keys['shift'];
  const spd = run ? player.runSpeed : player.speed;
  let dx=0, dy=0;
  if (keys['w']||keys['arrowup']) dy=-1;
  if (keys['s']||keys['arrowdown']) dy=1;
  if (keys['a']||keys['arrowleft']) dx=-1;
  if (keys['d']||keys['arrowright']) dx=1;
  if (dx&&dy) { dx*=0.707; dy*=0.707; }
  player.x = Math.max(16, Math.min(W-16, player.x + dx*spd));
  player.y = Math.max(16, Math.min(H-16, player.y + dy*spd));
  player.moving = dx!==0||dy!==0;
  if (player.moving) {
    player.facing = Math.atan2(dy, dx);
    player.walkTimer++;
    if (player.walkTimer > 8) { player.walkFrame=(player.walkFrame+1)%4; player.walkTimer=0; }
  }
  player.facing = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  if (player.invincible > 0) player.invincible--;
  if (player.shootCooldown > 0) player.shootCooldown--;
  if (player.combo > 0) { player.comboTimer--; if (player.comboTimer<=0) player.combo=0; }

  if (player.reloading) {
    player.reloadTime--;
    if (player.reloadTime <= 0) {
      player.ammo = player.maxAmmo;
      player.reloading = false;
      updateAmmoUI();
    }
  }

  for (let i=bullets.length-1; i>=0; i--) {
    const b = bullets[i];
    b.x+=b.vx; b.y+=b.vy; b.life--;
    if (b.life<=0||b.x<0||b.x>W||b.y<0||b.y>H) { bullets.splice(i,1); continue; }
    if (b.owner==='player') {
      for (let j=enemies.length-1; j>=0; j--) {
        const e = enemies[j];
        if (e.dead) continue;
        const d = Math.hypot(b.x-e.x, b.y-e.y);
        if (d < e.size/2+6) {
          e.hp -= b.dmg;
          for (let k=0; k<8; k++) particles.push({ x:b.x, y:b.y,
            vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5,
            life:20, color:'#cc0000', r:3 });
          bloodPools.push({ x:e.x+Math.random()*20-10, y:e.y+Math.random()*20-10,
            r:4+Math.random()*8, alpha:0.6 });
          bullets.splice(i,1);
          if (e.hp<=0 && !e.dead) {
            e.dead=true; e.deathTimer=40;
            player.score += e.score;
            player.kills++;
            player.combo++;
            player.comboTimer=180;
            enemiesLeft--;
            const names = {soldier:'Солдат',heavy:'Тяжёлый',sniper:'Снайпер'};
            addKillMsg('+'+e.score+' — '+names[e.type]+' уничтожен!');
            for (let k=0; k<16; k++) particles.push({ x:e.x, y:e.y,
              vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8,
              life:35, color:k<8?'#cc0000':'#ff6600', r:4 });
          }
          break;
        }
      }
    } else {
      const d = Math.hypot(b.x-player.x, b.y-player.y);
      if (d < 16 && player.invincible===0) {
        player.hp -= b.dmg;
        player.invincible = 30;
        player.combo = 0;
        bullets.splice(i,1);
        for (let k=0; k<6; k++) particles.push({ x:player.x, y:player.y,
          vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4,
          life:20, color:'#ff0000', r:3 });
        if (player.hp <= 0) { player.hp=0; endGame(); }
      }
    }
  }

  for (let i=enemies.length-1; i>=0; i--) {
    const e = enemies[i];
    if (e.dead) { e.deathTimer--; if (e.deathTimer<=0) enemies.splice(i,1); continue; }
    const angle = Math.atan2(player.y-e.y, player.x-e.x);
    const dist = Math.hypot(player.x-e.x, player.y-e.y);
    e.facing = angle;
    if (dist > 120 || e.type==='heavy') {
      e.x += Math.cos(angle)*e.speed;
      e.y += Math.sin(angle)*e.speed;
      e.walkTimer = (e.walkTimer||0)+1;
      if (e.walkTimer>8) { e.walkFrame=((e.walkFrame||0)+1)%4; e.walkTimer=0; }
    }
    e.fireCd--;
    if (e.fireCd <= 0 && dist < (e.type==='sniper'?500:280)) {
      e.fireCd = e.fireRate;
      const spread = e.type==='sniper' ? 0.02 : 0.12;
      const a = angle + (Math.random()-0.5)*spread;
      const spd2 = e.type==='sniper' ? 12 : 8;
      bullets.push({ x:e.x, y:e.y, vx:Math.cos(a)*spd2, vy:Math.sin(a)*spd2,
        life:80, owner:'enemy', dmg:e.dmg });
      for (let k=0; k<3; k++) particles.push({ x:e.x, y:e.y,
        vx:Math.cos(a+Math.PI+(Math.random()-0.5))*1.5,
        vy:Math.sin(a+Math.PI+(Math.random()-0.5))*1.5,
        life:10, color:'#ff8800', r:2 });
    }
  }

  for (let i=particles.length-1; i>=0; i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.life--;
    p.vx*=0.92; p.vy*=0.92;
    if (p.life<=0) particles.splice(i,1);
  }

  if (waveActive && enemiesLeft<=0 && enemies.filter(e=>!e.dead).length===0) {
    waveActive=false;
    player.wave++;
    player.hp=Math.min(player.maxHp, player.hp+30);
    player.ammo=player.maxAmmo;
    updateAmmoUI();
    showWaveMsg('ВОЛНА ПРОЙДЕНА!');
    setTimeout(()=>spawnWave(player.wave), 3000);
  }

  document.getElementById('scoreVal').textContent = player.score;
  document.getElementById('waveVal').textContent = player.wave;
  document.getElementById('killVal').textContent = player.kills;
  document.getElementById('healthFill').style.width = (player.hp/player.maxHp*100)+'%';
  if (player.combo>1) {
    const cd=document.getElementById('comboDisplay');
    cd.textContent='КОМБО x'+player.combo;
    cd.style.opacity='1'; comboVisible=60;
  }
  if (comboVisible>0) { comboVisible--; if(comboVisible<=0) document.getElementById('comboDisplay').style.opacity='0'; }

  killMsgs.forEach(m=>m.t--);
  killMsgs=killMsgs.filter(m=>m.t>0);
  const kf=document.getElementById('killFeed');
  kf.innerHTML=killMsgs.map(m=>`<div class="kill-msg" style="opacity:${Math.min(1,m.t/30)}">${m.txt}</div>`).join('');
}

function drawBackground() {
  ctx.fillStyle='#0d1f0d';
  ctx.fillRect(0,0,W,H);
  for (let y=0;y<H;y+=32) for (let x=0;x<W;x+=32) {
    if ((x+y)%64===0) { ctx.fillStyle='rgba(0,30,0,0.3)'; ctx.fillRect(x,y,32,32); }
  }
  ctx.save();
  for (const b of bushes) {
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle=b.c; ctx.fill();
  }
  ctx.restore();
}

function drawTrees() {
  for (const t of trees) {
    ctx.beginPath(); ctx.arc(t.x,t.y,t.r,0,Math.PI*2);
    ctx.fillStyle=t.c; ctx.fill();
    ctx.beginPath(); ctx.arc(t.x,t.y-t.r*0.3,t.r2,0,Math.PI*2);
    ctx.fillStyle=t.c2; ctx.fill();
    ctx.beginPath(); ctx.arc(t.x,t.y,3,0,Math.PI*2);
    ctx.fillStyle='#3a2800'; ctx.fill();
  }
}

function drawBlood() {
  for (const b of bloodPools) {
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(120,0,0,${b.alpha})`;
    ctx.fill();
  }
}

function drawEntity(x,y,facing,size,color,hp,maxHp,dead,deathTimer,isPlayer,walkFrame,invincible) {
  ctx.save(); ctx.translate(x,y);
  if (dead) {
    ctx.globalAlpha = deathTimer/40;
    ctx.rotate(Math.PI/2);
    drawBody(size,color,'#333',isPlayer);
    ctx.restore(); return;
  }
  if (isPlayer && invincible>0 && Math.floor(invincible/4)%2===0) { ctx.globalAlpha=0.5; }
  ctx.rotate(facing);
  const bob = Math.sin(walkFrame*Math.PI/2)*2;
  ctx.translate(0, bob);
  drawBody(size, color, isPlayer?'#2a5a1a':color, isPlayer);
  if (!isPlayer) {
    const barW=size, barH=4;
    ctx.rotate(-facing);
    ctx.fillStyle='#330000';
    ctx.fillRect(-barW/2,-size/2-10,barW,barH);
    ctx.fillStyle=`hsl(${(hp/maxHp)*120},100%,45%)`;
    ctx.fillRect(-barW/2,-size/2-10,barW*(hp/maxHp),barH);
  }
  ctx.restore();
}

function drawBody(size,bodyColor,shadowColor,isPlayer) {
  const s = size/24;
  ctx.scale(s,s);
  ctx.fillStyle='#222';
  ctx.fillRect(-6,2,12,14);
  ctx.fillStyle=isPlayer?'#2a6a2a':bodyColor;
  ctx.fillRect(-5,0,10,13);
  ctx.fillStyle='#c8a878';
  ctx.beginPath(); ctx.arc(0,-6,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=isPlayer?'#1a4a1a':'#333';
  ctx.beginPath(); ctx.arc(0,-7,5,Math.PI,0); ctx.fill();
  if (isPlayer) {
    ctx.fillStyle='#8B4513';
    ctx.fillRect(6,-2,14,3);
    ctx.fillStyle='#333';
    ctx.fillRect(8,-3,12,1.5);
  } else {
    ctx.fillStyle='#555';
    ctx.fillRect(6,-2,12,3);
  }
  ctx.fillStyle=isPlayer?'#2a6a2a':bodyColor;
  ctx.fillRect(-8,2,3,10);
  ctx.fillRect(5,2,3,10);
  ctx.fillRect(-4,12,3,10);
  ctx.fillRect(1,12,3,10);
}

function drawCrosshair(mx,my) {
  ctx.save(); ctx.strokeStyle='rgba(127,255,0,0.7)'; ctx.lineWidth=1.5;
  const s=12;
  ctx.beginPath(); ctx.moveTo(mx-s-4,my); ctx.lineTo(mx-4,my); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mx+4,my); ctx.lineTo(mx+s+4,my); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mx,my-s-4); ctx.lineTo(mx,my-4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mx,my+4); ctx.lineTo(mx,my+s+4); ctx.stroke();
  ctx.beginPath(); ctx.arc(mx,my,4,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

function drawBullets() {
  for (const b of bullets) {
    ctx.save(); ctx.translate(b.x,b.y);
    const a=Math.atan2(b.vy,b.vx); ctx.rotate(a);
    ctx.fillStyle = b.owner==='player'?'#ffd700':'#ff4444';
    ctx.beginPath();
    ctx.ellipse(0,0,6,2,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life/30;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.fill();
  }
  ctx.globalAlpha=1;
}

function draw() {
  ctx.clearRect(0,0,W,H);
  drawBackground();
  drawBlood();
  drawTrees();
  for (const e of enemies) {
    drawEntity(e.x,e.y,e.facing,e.size,e.color,e.hp,e.maxHp,e.dead,e.deathTimer,false,e.walkFrame||0,0);
  }
  drawEntity(player.x,player.y,player.facing,26,'#2a6a2a',player.hp,player.maxHp,false,0,true,player.walkFrame,player.invincible);
  drawBullets();
  drawParticles();
  drawCrosshair(mouse.x, mouse.y);
  if (player.reloading) {
    const prog = 1-(player.reloadTime/120);
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(player.x-30,player.y+22,60,8);
    ctx.fillStyle='#7fff00';
    ctx.fillRect(player.x-30,player.y+22,60*prog,8);
    ctx.strokeStyle='#4a8a4a'; ctx.lineWidth=1;
    ctx.strokeRect(player.x-30,player.y+22,60,8);
  }
}

function endGame() {
  gameRunning=false; gameOver=true;
  const o=document.getElementById('overlay');
  o.innerHTML=`<h1 style="color:#ff4444">УБИТ!</h1>
    <p style="font-size:18px;color:#7fff00">Счёт: <b>${player.score}</b><br>Убито врагов: <b>${player.kills}</b><br>Волна: <b>${player.wave}</b></p>
    <button id="startBtn" onclick="startGame()">▶ СНОВА В БОЙ</button>`;
  o.style.display='flex';
}

function loop() {
  if (!gameRunning) return;
  update(); draw();
  requestAnimationFrame(loop);
}

updateAmmoUI();
</script>
</body>
</html>
